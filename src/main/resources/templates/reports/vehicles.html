<table class="table table-striped text-white">
    <thead>
    <tr>
        <th>Model</th>
        <th>Trim</th>
        <th>Số lượng tồn</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="v : ${vehicles}">
        <td th:text="${v.model_name}"></td>
        <td th:text="${v.trim_name}"></td>
        <td th:text="${v.qty}"></td>
    </tr>
    </tbody>
</table>
