<table class="table table-hover text-white">
    <thead>
    <tr>
        <th>Ngày</th>
        <th>Tổng tiền</th>
        <th>Số đơn hàng</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="row : ${sales}">
        <td th:text="${row.day}"></td>
        <td th:text="${#numbers.formatDecimal(row.total_amount, 1, 'COMMA', 2, 'POINT')} + '₫'"></td>
        <td th:text="${row.orders_count}"></td>
    </tr>
    </tbody>
</table>
